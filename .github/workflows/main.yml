
name: CI

on:
  push:
    branches: [main, dev, ci/postgres-local-tests]
  pull_request:
    branches: [main]

jobs:
  testes-automatizados:
    name: Testes automatizados
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: biblioteca_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install
        working-directory: backend

      - name: Gerar Prisma Client
        run: npx prisma generate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/biblioteca_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/biblioteca_test

      - name: Rodar Migrations
        run: npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/biblioteca_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/biblioteca_test

      - name: Executar testes
        run: npm test
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/biblioteca_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/biblioteca_test
          JWT_KEY: ${{ secrets.JWT_KEY }}

  deploy-render:
    name: Deploy no Render
    needs: testes-automatizados
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Disparar deploy no Render
        run: |
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
